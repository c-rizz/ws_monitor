# Web configuration for ws_monitor.
#
# Use the user_aliases section to merge multiple usernames that belong to the same person.
# Each key is the canonical name; the list contains the aliases that should map to it.
#
# Example:
# user_aliases:
#   alice.rossi:
#     - arossi_gpu
#     - arossi_cpu
#   shared_account:
#     - ws-user-1
#     - ws-user-2
#
# Remove the example entries and add your own.
#
# Use the notice_html field to display a notice at the top of the page.
# The value is rendered as raw HTML, so you can use HTML tags.
#
# Example:
# notice_html: |
#   Please, <strong>DO NOT START NEW TASKS ON A WORKSTATION IF IT IS ALREADY IN USE</strong> by someone else!<br>
#   If you need to use a workstation that is already in use, please <strong>CONTACT THE USER FIRST</strong>.<br>

